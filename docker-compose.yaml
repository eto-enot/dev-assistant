  vllm_emb:
    build: vllm-cuda
    runtime: nvidia
    ipc: host
    volumes:
      - ./vllm-cache:/root/.cache
      - ./etc/vllm_logging.json:/root/vllm_logging.json
    environment:
      - VLLM_LOGGING_CONFIG_PATH=/root/vllm_logging.json
      # - VLLM_DEBUG_LOG_API_SERVER_RESPONSE=true
    command: >
      ${VLLM_EMB_MODEL}
      -tp 1
      --served_model_name 'Embedding Model'
      --enable-log-outputs --enable-log-requests
      --gpu-memory-utilization 0.1
      --dtype bfloat16
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:v1.80.11-stable.1
    volumes:
      - ./etc/litellm_config.yaml:/app/config.yaml
    ports:
      - 4000:4000
    networks:
      - back_net
    command: --config /app/config.yaml
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - 9090:9090
    volumes:
      - ./etc/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - back_net
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.3
    ports:
      - 3000:3000
    networks:
      - back_net
    depends_on:
      - prometheus

networks:
  back_net:
