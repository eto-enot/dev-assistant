services:
  qdrant:
    image: qdrant/qdrant:v1.16
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
      
  vllm_llm:
    image: 'ghcr.io/ggml-org/llama.cpp:server-cuda12-b8132'
    runtime: nvidia
    ipc: host
    volumes:
      - /mnt/c/Users/user/AppData/Local/llama.cpp:/models
    command: >
      -m ${LLAMA_LLM_MODEL}
      --jinja
      -fa 1 -cmoe -ngl 99 --n-cpu-moe 30
      -c 32768
      --temp 0.7
      --min-p 0.0 --top-p 0.80 --top-k 20
      --repeat-penalty 1.1
      --host 0.0.0.0 --port 8000
      --metrics
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]
    
