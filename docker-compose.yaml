services:
  qdrant:
    image: qdrant/qdrant:v1.16
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  vllm_llm:
    build: vllm-cuda
    runtime: nvidia
    ipc: host
    volumes:
      - ./vllm-cache:/root/.cache
      - ./etc/vllm_logging.json:/root/vllm_logging.json
      - ./logs_llm:/root/logs
    environment:
      - OTEL_SERVICE_NAME=vllm_llm
      - VLLM_LOGGING_CONFIG_PATH=/root/vllm_logging.json
      - LD_LIBRARY_PATH=/usr/local/nvidia/lib64:/usr/local/nvidia/lib:/usr/lib/x86_64-linux-gnu
      # - VLLM_DEBUG_LOG_API_SERVER_RESPONSE=true
    command: >
      ${VLLM_LLM_MODEL}
      --served_model_name 'Coder LLM'
      --enable-log-outputs
      --enable-log-requests
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --gpu-memory-utilization 0.65
      --dtype bfloat16
      --max-num-seqs 16
      --max-num-batched-tokens 2048
      --speculative-config '{"method": "draft_model", "model": "${VLLM_LLM_DRAFT_MODEL}", "num_speculative_tokens": 4}'
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]

  vllm_emb:
    build: vllm-cuda
    runtime: nvidia
    ipc: host
    volumes:
      - ./vllm-cache:/root/.cache
      - ./etc/vllm_logging.json:/root/vllm_logging.json
      - ./logs_emb:/root/logs
    environment:
      - OTEL_SERVICE_NAME=vllm_emb
      - VLLM_LOGGING_CONFIG_PATH=/root/vllm_logging.json
      # - VLLM_DEBUG_LOG_API_SERVER_RESPONSE=true
    command: >
      ${VLLM_EMB_MODEL}
      -tp 1
      --served_model_name 'Embedding Model'
      --enable-log-outputs --enable-log-requests
      --gpu-memory-utilization 0.1
      --dtype bfloat16
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:v1.80.11-stable.1
    volumes:
      - ./etc/litellm_config.yaml:/app/config.yaml
    ports:
      - 4000:4000
    networks:
      - back_net
    command: --config /app/config.yaml
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - 9090:9090
    volumes:
      - ./etc/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - back_net
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.3
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./etc/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - 3000:3000
    networks:
      - back_net
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:main-93650c0
    ports:
      - "3100:3100"
    volumes:
      - ./etc/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - back_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: --config=/etc/otel-collector-config.yaml
    volumes:
      - ./etc/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./logs_llm:/logs_llm
      - ./logs_emb:/logs_emb
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - back_net
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

networks:
  back_net:
