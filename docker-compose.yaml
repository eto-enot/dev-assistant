services:
  qdrant:
    image: qdrant/qdrant:v1.16
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  vllm_llm:
    build: vllm-cuda
    runtime: nvidia
    ipc: host
    volumes:
      - ./vllm-cache:/root/.cache
      - ./etc/vllm_logging.json:/root/vllm_logging.json
    environment:
      - VLLM_LOGGING_CONFIG_PATH=/root/vllm_logging.json
      - LD_LIBRARY_PATH=/usr/local/nvidia/lib64:/usr/local/nvidia/lib:/usr/lib/x86_64-linux-gnu
      # - VLLM_DEBUG_LOG_API_SERVER_RESPONSE=true
    command: >
      ${VLLM_LLM_MODEL}
      --served_model_name 'Coder LLM'
      --enable-log-outputs
      --enable-log-requests
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --gpu-memory-utilization 0.45
      --dtype bfloat16
      --max-num-seqs 16
      --max-num-batched-tokens 2048
      --speculative-config '{"method": "draft_model", "model": "${VLLM_LLM_DRAFT_MODEL}", "num_speculative_tokens": 4}'
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]

  vllm_emb:
    build: vllm-cuda
    runtime: nvidia
    ipc: host
    volumes:
      - ./vllm-cache:/root/.cache
      - ./etc/vllm_logging.json:/root/vllm_logging.json
    environment:
      - VLLM_LOGGING_CONFIG_PATH=/root/vllm_logging.json
      # - VLLM_DEBUG_LOG_API_SERVER_RESPONSE=true
    command: >
      ${VLLM_EMB_MODEL}
      -tp 1
      --served_model_name 'Embedding Model'
      --enable-log-outputs --enable-log-requests
      --gpu-memory-utilization 0.1
      --dtype bfloat16
    networks:
      - back_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['${VLLM_GPU_DEVICE}']
            capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:v1.80.11-stable.1
    volumes:
      - ./etc/litellm_config.yaml:/app/config.yaml
    ports:
      - 4000:4000
    networks:
      - back_net
    command: --config /app/config.yaml
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - 9090:9090
    volumes:
      - ./etc/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - back_net
    depends_on:
      vllm_llm:
        condition: service_healthy
      vllm_emb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.3
    ports:
      - 3000:3000
    networks:
      - back_net
    depends_on:
      - prometheus

networks:
  back_net:
