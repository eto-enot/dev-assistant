<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #343541;
            color: #ececf1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background-color: #202123;
            padding: 1rem;
            border-bottom: 1px solid #4d4d4f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            color: #10a37f;
            font-size: 1.5rem;
        }
        
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .api-config {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input, select {
            background-color: #40414f;
            border: 1px solid #565869;
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: white;
            font-size: 0.9rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #10a37f;
        }
        
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 260px;
            background-color: #202123;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .new-chat-btn {
            background-color: transparent;
            border: 1px solid #565869;
            color: white;
            border-radius: 6px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background-color 0.2s;
        }
        
        .new-chat-btn:hover {
            background-color: #2d2d3a;
        }
        
        .history-title {
            font-size: 0.8rem;
            color: #8e8ea0;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        
        .history-list {
            list-style: none;
        }
        
        .history-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-item:hover {
            background-color: #2d2d3a;
        }
        
        .history-item.active {
            background-color: #343541;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .message {
            display: flex;
            gap: 1.5rem;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .user .avatar {
            background-color: #5436da;
        }
        
        .assistant .avatar {
            background-color: #10a37f;
        }
        
        .message-content {
            padding-top: 0.5rem;
            line-height: 1.5;
            width: 100%;
            overflow-x: auto;
        }
        
        .input-container {
            padding: 1.5rem;
            border-top: 1px solid #4d4d4f;
            background-color: rgba(52, 53, 65, 0.9);
        }
        
        .input-area {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }
        
        textarea {
            width: 100%;
            background-color: #40414f;
            border: 1px solid #565869;
            border-radius: 12px;
            padding: 1rem 3rem 1rem 1rem;
            color: white;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            min-height: 56px;
            line-height: 1.5;
        }
        
        textarea:focus {
            outline: none;
            border-color: #565869;
        }
        
        .send-button {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            background-color: transparent;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            transition: color 0.2s;
        }
        
        .send-button:hover {
            color: #ececf1;
        }
        
        .send-button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 0.5rem 0;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #8e8ea0;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes pulse {
            0%, 60%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
        
        .message-controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .control-btn {
            background-color: #40414f;
            border: none;
            border-radius: 4px;
            color: #8e8ea0;
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .control-btn:hover {
            background-color: #565869;
            color: #ececf1;
        }
        
        .error-message {
            background-color: #4a1d1d;
            border: 1px solid #8b3434;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem auto;
            max-width: 768px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-message i {
            color: #e53e3e;
        }
        
        .model-tag {
            background-color: #10a37f;
            color: white;
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }
        
        /* Markdown Styling */
        .markdown-content {
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .markdown-content h1 {
            font-size: 1.8rem;
            border-bottom: 1px solid #4d4d4f;
            padding-bottom: 0.3rem;
        }
        
        .markdown-content h2 {
            font-size: 1.5rem;
        }
        
        .markdown-content h3 {
            font-size: 1.3rem;
        }
        
        .markdown-content h4 {
            font-size: 1.1rem;
        }
        
        .markdown-content p {
            margin-bottom: 1rem;
        }
        
        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        
        .markdown-content li {
            margin-bottom: 0.5rem;
        }
        
        .markdown-content blockquote {
            border-left: 4px solid #10a37f;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #c9c9d1;
            font-style: italic;
        }
        
        .markdown-content code {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #ffcc99;
        }
        
        .markdown-content pre {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
            border: 1px solid #40414f;
        }
        
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.9em;
            line-height: 1.5;
            display: block;
        }
        
        .markdown-content table {
            border-collapse: collapse;
            margin: 1rem 0;
            width: 100%;
            background-color: #2d2d3a;
        }
        
        .markdown-content th,
        .markdown-content td {
            border: 1px solid #4d4d4f;
            padding: 0.75rem;
            text-align: left;
        }
        
        .markdown-content th {
            background-color: #40414f;
            font-weight: 600;
        }
        
        .markdown-content tr:nth-child(even) {
            background-color: #343541;
        }
        
        .markdown-content a {
            color: #10a37f;
            text-decoration: none;
        }
        
        .markdown-content a:hover {
            text-decoration: underline;
        }
        
        .markdown-content strong {
            font-weight: 600;
            color: #ffffff;
        }
        
        .markdown-content em {
            font-style: italic;
        }
        
        .markdown-content hr {
            border: none;
            border-top: 1px solid #4d4d4f;
            margin: 2rem 0;
        }
        
        .copy-code-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: #40414f;
            border: 1px solid #565869;
            color: #8e8ea0;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            opacity: 0;
        }
        
        .code-block-wrapper {
            position: relative;
        }
        
        .code-block-wrapper:hover .copy-code-btn {
            opacity: 1;
        }
        
        .copy-code-btn:hover {
            background-color: #565869;
            color: #ffffff;
        }
        
        .copy-code-btn.copied {
            background-color: #10a37f;
            color: white;
            border-color: #10a37f;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message {
                gap: 1rem;
            }
            
            .api-config {
                flex-direction: column;
                align-items: flex-end;
            }
            
            .api-config input {
                width: 150px;
            }
            
            .markdown-content pre {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Developer Assistant</h1>
        </div>
        <div class="api-config">
            <select id="model-select">
                <option value="Coder LLM">Coder LLM</option>
            </select>
            <!-- <input type="text" id="api-key" placeholder="API Key" value="sk-..."> -->
            <input type="text" id="api-endpoint" placeholder="API Endpoint" value="http://localhost:8000/v1/chat/completions">
        </div>
    </header>
    
    <div class="container">
        <!--<div class="sidebar">
            <button class="new-chat-btn" id="new-chat">
                <i class="fas fa-plus"></i>
                New chat
            </button>
            <div class="history-title">Today</div>
            <ul class="history-list" id="history-list">
            </ul>
        </div>-->
        
        <div class="chat-container">
            <div class="messages" id="messages">
                <!-- Messages will be added here -->
            </div>
            
            <div class="input-container">
                <div class="input-area">
                    <textarea id="message-input" placeholder="Ask something..." rows="1"></textarea>
                    <button class="send-button" id="send-button">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/xml.min.js"></script>
    <script>
        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        //const newChatButton = document.getElementById('new-chat');
        const historyList = document.getElementById('history-list');
        const apiKeyInput = document.getElementById('api-key');
        const apiEndpointInput = document.getElementById('api-endpoint');
        const modelSelect = document.getElementById('model-select');
        const modelTag = document.getElementById('model-tag');
        
        // State management
        let currentConversationId = generateId();
        let conversations = JSON.parse(sessionStorage.getItem('conversations')) || {};
        let isStreaming = false;
        
        // Initialize the app
        function init() {
            //loadConversations();
            setActiveConversation(currentConversationId);
            
            // Set up event listeners
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            //newChatButton.addEventListener('click', startNewChat);
            
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
            
            modelSelect.addEventListener('change', function() {
                modelTag.textContent = this.value;
                if (this.value === 'custom') {
                    apiEndpointInput.style.display = 'inline-block';
                } else {
                    apiEndpointInput.style.display = 'inline-block';
                }
            });
            
            // Load default conversation if it exists
            if (conversations[currentConversationId]) {
                displayConversation(currentConversationId);
            } else {
                // Display welcome message
                displayWelcomeMessage();
            }
            
            // Initialize highlight.js
            hljs.highlightAll();
        }
        
        // Generate a unique ID for conversations
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // Display welcome message
        function displayWelcomeMessage() {
            const welcomeMessage = `
                <div class="message assistant">
                    <div class="avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="markdown-content">
                            <h2>Welcome to OpenAI API Chat with Markdown!</h2>
                            <p>I'm an AI assistant powered by the OpenAI API. I can display formatted content including:</p>
                            <ul>
                                <li><strong>Code blocks</strong> with syntax highlighting</li>
                                <li><strong>Headers</strong> (like this one!)</li>
                                <li><strong>Lists</strong> (both ordered and unordered)</li>
                                <li><strong>Tables</strong> with proper formatting</li>
                                <li><strong>Bold and italic</strong> text</li>
                                <li><strong>Quotes</strong> and blockquotes</li>
                                <li><strong>Links</strong> that you can click</li>
                            </ul>
                            <p>Try asking me to:</p>
                        <div class="message-controls">
                                <button class="control-btn" onclick="suggestPrompt('Write a Python function to calculate factorial with a docstring')">
                                    <i class="fas fa-code"></i> Python example
                            </button>
                                <button class="control-btn" onclick="suggestPrompt('Create a comparison table of programming languages')">
                                    <i class="fas fa-table"></i> Create a table
                            </button>
                                <button class="control-btn" onclick="suggestPrompt('Explain the concept of recursion with examples')">
                                    <i class="fas fa-sitemap"></i> Explain recursion
                            </button>
                        </div>
                            <p>To get started, enter your API key in the header above.</p>
                        </div>
                    </div>
                </div>
            `;
            
            //messagesContainer.innerHTML = welcomeMessage;
            initializeCopyButtons();
        }
        
        // Suggest a prompt
        function suggestPrompt(prompt) {
            messageInput.value = prompt;
            messageInput.style.height = 'auto';
            messageInput.style.height = (messageInput.scrollHeight) + 'px';
            messageInput.focus();
        }
        
        // Load conversations from localStorage
        function loadConversations() {
            historyList.innerHTML = '';
            
            if (Object.keys(conversations).length === 0) {
                const emptyItem = document.createElement('li');
                emptyItem.className = 'history-item';
                emptyItem.textContent = 'No conversations yet';
                historyList.appendChild(emptyItem);
                return;
            }
            
            // Sort conversations by timestamp (newest first)
            const sortedConversations = Object.entries(conversations)
                .sort((a, b) => b[1].timestamp - a[1].timestamp);
            
            sortedConversations.forEach(([id, conv]) => {
                const historyItem = document.createElement('li');
                historyItem.className = 'history-item';
                historyItem.dataset.id = id;
                
                // Use first user message as title, or default
                const firstUserMessage = conv.messages.find(m => m.role === 'user');
                const title = firstUserMessage 
                    ? (firstUserMessage.content.length > 30 
                        ? firstUserMessage.content.substring(0, 30) + '...' 
                        : firstUserMessage.content)
                    : 'New Conversation';
                
                historyItem.textContent = title;
                historyItem.addEventListener('click', () => setActiveConversation(id));
                
                historyList.appendChild(historyItem);
            });
        }
        
        // Set active conversation
        function setActiveConversation(id) {
            // Update active state in history list
            document.querySelectorAll('.history-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id === id) {
                    item.classList.add('active');
                }
            });
            
            currentConversationId = id;
            displayConversation(id);
        }
        
        // Display a conversation
        function displayConversation(id) {
            const conversation = conversations[id];
            
            if (!conversation) {
                displayWelcomeMessage();
                return;
            }
            
            messagesContainer.innerHTML = '';
            
            conversation.messages.forEach(message => {
                addMessageToUI(message.role, message.content, false);
            });
            
            // Reinitialize syntax highlighting and copy buttons
            setTimeout(() => {
                hljs.highlightAll();
                initializeCopyButtons();
            }, 100);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Start a new chat
        function startNewChat() {
            currentConversationId = generateId();
            setActiveConversation(currentConversationId);
            displayWelcomeMessage();
        }
        
        // Send a message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;
            
            // Add user message to UI
            addMessageToUI('user', message);
            
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Disable send button while streaming
            isStreaming = true;
            sendButton.disabled = true;
            
            // Add assistant placeholder message
            const messageId = addMessageToUI('assistant', '');
            
            // Get API configuration
            const apiKey = '';// apiKeyInput.value.trim();
            const endpoint = apiEndpointInput.value.trim();
            const model = modelSelect.value;
            
            // Validate API key
            /*if (!apiKey) {
                showError('Please enter a valid API key');
                updateMessageContent(messageId, 'Error: Please enter a valid API key in the header.');
                isStreaming = false;
                sendButton.disabled = false;
                return;
            }*/
            
            // Save user message to conversation history
            saveMessageToConversation('user', message);
            
            // Prepare the request
            const requestBody = {
                model: model,
                messages: getConversationHistory(),
                stream: true
            };
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }
                
                // Process streaming response
                await processStreamResponse(response, messageId);
                
                // Save assistant message to conversation history
                const assistantMessage = document.getElementById(`content-${messageId}`).innerText;
                saveMessageToConversation('assistant', assistantMessage);
                
            } catch (error) {
                console.error('Error:', error);
                updateMessageContent(messageId, `Error: ${error.message}. Please check your API key, endpoint, and network connection.`);
            } finally {
                isStreaming = false;
                sendButton.disabled = false;
                
                // Reinitialize syntax highlighting and copy buttons
                setTimeout(() => {
                    hljs.highlightAll();
                    initializeCopyButtons();
                }, 100);
            }
        }
        
        // Process streaming response
        async function processStreamResponse(response, messageId) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulatedText = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n').filter(line => line.trim() !== '');
                
                for (const line of lines) {
                    // Skip non-data lines
                    if (!line.startsWith('data: ')) continue;
                    
                    const data = line.substring(6);
                    
                    // Skip [DONE] message
                    if (data === '[DONE]') {
                        continue;
                    }
                    
                    try {
                        const parsed = JSON.parse(data);
                        const content = parsed.choices[0]?.delta?.content || '';
                        
                        if (content) {
                            accumulatedText += content;
                            updateMessageContent(messageId, accumulatedText);
                        }
                    } catch (e) {
                        console.error('Error parsing stream data:', e);
                    }
                }
            }
        }
        
        // Get conversation history for API request
        function getConversationHistory() {
            if (!conversations[currentConversationId]) {
                return [];
            }
            
            // Return only the messages (without metadata)
            return conversations[currentConversationId].messages.map(msg => ({
                role: msg.role,
                content: msg.content
            }));
        }
        
        // Save message to conversation history
        function saveMessageToConversation(role, content) {
            if (!conversations[currentConversationId]) {
                conversations[currentConversationId] = {
                    id: currentConversationId,
                    timestamp: Date.now(),
                    messages: []
                };
            }
            
            conversations[currentConversationId].messages.push({
                role,
                content,
                timestamp: Date.now()
            });
            
            conversations[currentConversationId].timestamp = Date.now();
            
            // Update localStorage
            sessionStorage.setItem('conversations', JSON.stringify(conversations));
            
            // Update history list
            //loadConversations();
        }
        
        // Add message to UI
        function addMessageToUI(role, content, scroll = true) {
            const messageId = generateId();
            
            const messageElement = document.createElement('div');
            messageElement.className = `message ${role}`;
            messageElement.id = `msg-${messageId}`;
            
            const avatarIcon = role === 'user' ? 'fas fa-user' : 'fas fa-robot';
            
            messageElement.innerHTML = `
                <div class="avatar">
                    <i class="${avatarIcon}"></i>
                </div>
                <div class="message-content">
                    <div id="content-${messageId}" class="markdown-content">
                        ${role === 'assistant' && !content ? '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>' : ''}
                        ${content ? renderMarkdown(content) : (role === 'user' ? escapeHtml(content) : '')}
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(messageElement);
            
            if (scroll) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            return messageId;
        }
        
        // Update message content with markdown support
        function updateMessageContent(messageId, content) {
            const contentElement = document.getElementById(`content-${messageId}`);
            if (contentElement) {
                // Replace typing indicator with markdown content
                contentElement.innerHTML = renderMarkdown(content);
                
                // Apply syntax highlighting to code blocks
                setTimeout(() => {
                    hljs.highlightAll();
                    initializeCopyButtons();
                }, 0);
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }
        
        // Render markdown to HTML
        function renderMarkdown(text) {
            if (!text) return '';
            
            let html = escapeHtml(text);
            
            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');
            
            // Code blocks with language detection
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                const language = lang || 'plaintext';
                const escapedCode = escapeHtml(code.trim());
                return `<div class="code-block-wrapper"><button class="copy-code-btn" onclick="copyCodeToClipboard(this)">Copy</button><pre><code class="language-${language}">${escapedCode}</code></pre></div>`;
            });
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            
            // Lists (unordered)
            html = html.replace(/^\s*[-*+] (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            
            // Lists (ordered)
            html = html.replace(/^\s*\d+\. (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/g, '<ol>$1</ol>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Horizontal rule
            html = html.replace(/^---$/gim, '<hr>');
            
            // Tables (simple support)
            html = html.replace(/\|(.+)\|/g, function(match, row) {
                const cells = row.split('|').map(cell => cell.trim());
                if (cells.some(cell => cell.includes('---'))) {
                    return ''; // Skip separator rows for now
                }
                const cellTags = cells.map(cell => `<td>${cell}</td>`).join('');
                return `<tr>${cellTags}</tr>`;
            });
            
            // Wrap table rows in table tags
            const tableRows = html.match(/<tr>.*?<\/tr>/g);
            if (tableRows && tableRows.length > 0) {
                const tableHeader = '<table><thead><tr><th>Column 1</th><th>Column 2</th></tr></thead><tbody>';
                const tableFooter = '</tbody></table>';
                html = html.replace(/(<tr>.*?<\/tr>)/g, tableHeader + tableRows.join('') + tableFooter);
            }
            
            // Paragraphs (ensure proper wrapping)
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/<p><\/p>/g, '');
            
            // Handle line breaks
            html = html.replace(/\n/g, '<br>');
            
            // Wrap in paragraph tags if not already wrapped
            if (!html.startsWith('<') || html.startsWith('<br>')) {
                html = '<p>' + html + '</p>';
            }
            
            return html;
        }
        
        // Escape HTML special characters
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize copy buttons for code blocks
        function initializeCopyButtons() {
            document.querySelectorAll('.copy-code-btn').forEach(button => {
                button.addEventListener('click', function() {
                    copyCodeToClipboard(this);
                });
            });
        }
        
        // Copy code to clipboard
        function copyCodeToClipboard(button) {
            const codeBlock = button.parentElement.querySelector('code');
            const textToCopy = codeBlock.textContent;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                button.textContent = 'Failed!';
                setTimeout(() => {
                    button.textContent = 'Copy';
                }, 2000);
            });
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `
                <i class="fas fa-exclamation-circle"></i>
                <span>${message}</span>
            `;
            
            messagesContainer.appendChild(errorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Remove error after 5 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }
        
        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
