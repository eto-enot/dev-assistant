model_list:
  - model_name: Coder LLM
    litellm_params:
      model: openai/Coder LLM
      api_base: http://vllm_llm:8000/v1
      api_key: none
  - model_name: Embedding Model
    litellm_params:
      model: openai/Embedding Model
      api_base: http://vllm_emb:8000/v1
      api_key: none
  - model_name: Rerank Model
    litellm_params:
      model: hosted_vllm/Rerank Model
      api_base: http://vllm_rank:8000/v1
      api_key: none

litellm_settings:
  callbacks: ["otel"]
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

callback_settings:
  otel:
    message_logging: true