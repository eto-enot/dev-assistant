receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  prometheus:
    config:
      scrape_configs:
      - job_name: vllm_llm
        static_configs:
          - targets:
              - 'vllm_llm:8000'
      - job_name: vllm_emb
        static_configs:
          - targets:
              - 'vllm_emb:8000'
  
  filelog/llm:
    include: [ /logs_llm/*.json ]
    resource:
      service.name: vllm_llm
    operators:
      - type: json_parser

  filelog/emb:
    include: [ /logs_emb/*.json ]
    resource:
      service.name: vllm_emb
    operators:
      - type: json_parser

processors:
  batch:
    timeout: 1s
    send_batch_size: 10
  memory_limiter:
    limit_mib: 64
    check_interval: 5s

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true
  # debug:
  #   verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [prometheus, otlp]
      processors: []
      exporters: [prometheus]
    logs:
      receivers: [filelog/llm, filelog/emb, otlp]
      processors: []
      exporters: [otlphttp/loki]